name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - feat/**
      - codex/**

jobs:
  verify:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: finance_ledger
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d finance_ledger"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5433/finance_ledger?schema=public
      DEV_USER_ID: 1b58fb29-1f33-43d8-bdf0-b70844c20045
      PORT: 3001
      HOST: 0.0.0.0
      CORS_ORIGIN: http://localhost:3000
      NEXT_PUBLIC_API_URL: http://127.0.0.1:3001
      EXPO_PUBLIC_API_URL: http://127.0.0.1:3001

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm db:generate

      - name: Apply database migrations
        run: pnpm db:deploy

      - name: Seed development fixtures
        run: pnpm dev:seed

      - name: Typecheck
        run: pnpm check-types

      - name: Lint
        run: pnpm lint

      - name: Unit tests
        run: pnpm test

      - name: API e2e tests
        run: pnpm --filter @finance/api test:e2e
